<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More on CSS Selectors</title>
    <style>

        /* .box:first-child{
            background-color: red;
        } */

        /* .box::first-line{
            color: yellow;
        } */

        /* .boxes *{
            color: blue;
            border: 2px solid black;
        }

        p, a, .box, [data-color="primary"]{
            padding-top: 45px;
        } */

        /* .box:nth-child(odd){
            background-color: blue;
        } */

        /* .box:nth-last-child(2){
            background-color: red;
        } */

        .boxes::before {
            content: "Harry is good";
            color: blue;
        }

        .boxes::after {
            content: "Sigma course is also good";
            color: red;
        }

        ::selection {
            background-color: black;
            color: aqua;
        }

        .box::first-letter {
            color: peru;
            font-size: 45px;
        }

        input::placeholder {
            color: rgb(84, 84, 88);
        }
    </style>
</head>

<body>
    <div class="boxes">
        <div data-color="primary" class="box">I am first box</div>
        <div class="box">Hey I am a box</div>
        <div class="box">Hey I am a box</div>
        <input type="text" placeholder="Type your name here">
    </div>
</body>

</html>

<!-- 1. .box:first-child


Would select the first .box inside its parent and make its background red.

2. .box::first-line


Would color the first line of text inside each .box yellow.

3. .boxes *


Would select all elements inside .boxes, color their text blue, and add a black border.

4. p, a, .box, [data-color="primary"]


Would add padding-top: 45px to all <p>, <a>, .box, and elements with data-color="primary".

5. .box:nth-child(odd)


Would make every odd-numbered .box have a blue background.

6. .box:nth-last-child(2)


Would select the second-to-last .box and make its background red.

7. .boxes::before
Adds the text "Harry is good" before the content of .boxes and colors it blue.

8. .boxes::after
Adds the text "Sigma course is also good" after the content of .boxes and colors it red.

9. ::selection
Changes the background to black and text color to aqua when you select (highlight) text on the page.

10. .box::first-letter
Makes the first letter of each .box colored peru and increases its font size to 45px.

11. input::placeholder
Changes the color of placeholder text in input fields to a specific shade of gray (rgb(84, 84, 88)). -->

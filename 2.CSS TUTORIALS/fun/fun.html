<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luxury Clothing</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="navbar">

      <a href="#">Home</a>

      <a href="#" class="btn-outline">Shop Now</a>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body{
            background: #e2c5c5bd;
        }

        .card {
            height: 500px;
            width: 310px;
            padding: 8px;
            position: relative;
            background-color: rgba(22, 231, 231, 0.326);
            border-radius: 20px;
            margin-left: auto;
            margin-right: auto;
            border: 3px solid black;
            top: 10px;
            
            


        }

        .img {
            height: 220px;
            width: 300px;
            border-radius: 20px;

            position: absolute;
            top: 10px;
            margin-left: 5px;
        }
        .spand{
            padding: 4px;
        }
        .span{
            border: 1px solid black;
            position: relative;
            top: 230px;
            background-color: aliceblue;
            border-radius: 15px;
            padding: 2px;
            left: 15px;
            
        }
        .span2{
            border: 1px solid black;
            position: relative;
            top: 230px;
            background-color: aliceblue;
            border-radius: 15px;
            padding: 2px;
            left: 15px;
        }
        .heading{
            position: relative;
            top: 230px;
            padding: 2px;
        }
        .button{
            margin: 2px solid black;
            position: relative;
            top: 240px;
            padding: 5px;
            left: 110px;
            border-radius: 20px;
            color: rgb(0, 0, 0);
            background-color: rgba(155, 63, 241, 0.537);
            

        }
    
    </style>
</head>

<body>
    <div class="card">
        <div class="card20">
            <img class="img"
                src="https://media.istockphoto.com/id/1403500817/photo/the-craggies-in-the-blue-ridge-mountains.jpg?s=612x612&w=0&k=20&c=N-pGA8OClRVDzRfj_9AqANnOaDS3devZWwrQNwZuDSk="
                alt="image not found">
        </div >
        <div class="spand">
        <span class="span">nature</span>
        <span class="span2">mountain</span>
    </div>
    <div class="heading">
        <h2>THE MOUNTAINS</h2>

    </div>
    <button class="button">ABOUT US</button>

    </div>
</body>

</html>

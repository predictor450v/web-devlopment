<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hero">
    <div class="overlay"></div>
    <header class="header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" class="logo" />
      <div class="header-right">
        <select class="language-select">
          <option>English</option>
          <option>हिन्दी</option>
        </select>
        <button class="sign-in-btn">Sign In</button>
      </div>
    </header>
    <div class="hero-content">
      <h1><span class="line1">Unlimited movies, TV</span><br><span class="line2">shows and more</span></h1>
      <p class="subtext">Starts at ₹149. Cancel at any time.</p>
      <p class="subsubtext">Ready to watch? Enter your email to create or restart your membership.</p>
      <div class="email-form">
        <input type="email" placeholder="Email address" />
        <button>Get Started</button>
      </div>
    </div>
  </div>
</body>
</html>

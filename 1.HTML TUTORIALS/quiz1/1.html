<!-- Quick Quiz:
    Without using br tag, write a vertically aligned form asking for name, city and pincode of a user.
    Everyone must comment -->
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h1>information</h1>

        <form action="post"></form>
        <div>

            <label for="username">Enter your Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" autofocus>
        </div>
        <div>

            <label for="city">Enter your city</label>
            <input type="text" id="city" name="city" placeholder="Enter your city">
        </div>
        <div>

            <label for="pincode">Enter your pincode</label>
            <input type="number" id="pincode" name="pincode" placeholder="Enter your pincode">
        </div>
        <div>
            <label for="comment">Enter your comment</label>
            <br>
            <textarea id="comment" name="comment" rows="4" cols="50"></textarea>
        </div>
    </body>
    </html>

<!-- tags -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager</title>
</head>
<body>
    <h1>MY BOOKMARKS</h1>
    <h2>PRIMARY BOOKMARKS</h2>
    <p><a target="_blank"  href="https://www.google.com">Open google </a></p>
    <p><a target="_blank"  href="https://www.youtube.com">Open youtube </a></p>
    <p><a  href="https://www.hotstar.com">Open hotstar(no tab change)</a></p>
    <!-- <a> = anker tag ( we connect link with text) -->
        <!-- target="_blank" opens the link in new tab  -->
        <!-- by putting all in paragraph p , we will get all link in separate lines , in future we will use list for do this cause pragraph is not right way to do this  -->
        <h2>SECONDARY BOOKMARKS</h2>
        <p><a target="_blank"  href="https://www.facebook.com">Open facebook </a></p>
        <p><a target="_blank"  href="https://www.twitch.com">Open twitch </a></p>
</body>
</html>
